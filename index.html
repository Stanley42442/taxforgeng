    <div id="root">
      <!-- Initial loading state - replaced when React mounts -->
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8faf9;">
        <div style="text-align:center;">

          <p id="loader-text" style="color:#6b7280;font-family:system-ui;margin:0;">Loading TaxForge...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      // FAILSAFE: If React doesn't mount within 8 seconds, show error and reload option
      setTimeout(function() {
        var loader = document.getElementById('initial-loader');
        if (loader && loader.style.display !== 'none') {
          var spinner = document.getElementById('loader-spinner');
          var text = document.getElementById('loader-text');
          if (spinner) spinner.style.display = 'none';
          if (text) {
            text.innerHTML = 'App failed to load. <a href="javascript:location.reload(true)" style="color:#16a34a;text-decoration:underline;">Tap to retry</a>';
            text.style.color = '#ef4444';
          }
        }
      }, 8000);
    </script>
