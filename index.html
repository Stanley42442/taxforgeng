<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaxForge NG - Nigerian Tax Calculator & Business Advisory</title>
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.supabase.co https://api.ipify.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.paystack.co https://api.ipify.org https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    
    <!-- Critical Resource Preloading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://uhuxqrrtsiintcwpxxwy.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://api.paystack.co">
    
    <!-- Non-blocking font loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"></noscript>
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="description" content="Smart tax advice for Nigerian businesses. Get personalized business structure recommendations, accurate CIT/PIT/VAT calculations, and comply with Nigeria Tax Act 2025." />
    <meta name="author" content="TaxForge NG" />
    <meta name="keywords" content="Nigerian tax calculator, FIRS, business name registration, limited liability company Nigeria, CIT, PIT, VAT Nigeria, Tax Act 2025, small business tax Nigeria" />
    <link rel="canonical" href="https://taxforgeng.com" />

    <meta property="og:title" content="TaxForge NG - Nigerian Tax Calculator & Advisory" />
    <meta property="og:description" content="Smart tax advice for Nigerian businesses. Calculate CIT, PIT, VAT and get business structure recommendations." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://taxforgeng.com/og-image.png" />
    <meta property="og:url" content="https://taxforgeng.com" />
    <meta property="og:site_name" content="TaxForge NG" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TaxForge NG - Nigerian Tax Calculator" />
    <meta name="twitter:description" content="Smart tax advice for Nigerian businesses. Free calculator for CIT, PIT, VAT." />
    <meta name="twitter:image" content="https://taxforgeng.com/og-image.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16a34a" />
    
    <!-- iOS PWA Enhancements -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TaxForge" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TaxForge NG",
      "description": "Nigerian tax calculator and business advisory platform",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "NGN"
      }
    }
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Initial loading state - replaced when React mounts -->
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8faf9;">
        <div style="text-align:center;">
          <div id="loader-spinner" style="width:48px;height:48px;border:3px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
          <p id="loader-text" style="color:#6b7280;font-family:system-ui;margin:0;">Loading TaxForge...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      // FAILSAFE: If React doesn't mount within 8 seconds, show error and reload option
      setTimeout(function() {
        var loader = document.getElementById('initial-loader');
        if (loader && loader.style.display !== 'none') {
          var spinner = document.getElementById('loader-spinner');
          var text = document.getElementById('loader-text');
          if (spinner) spinner.style.display = 'none';
          if (text) {
            text.innerHTML = 'App failed to load. <a href="javascript:location.reload(true)" style="color:#16a34a;text-decoration:underline;">Tap to retry</a>';
            text.style.color = '#ef4444';
          }
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
